name: release

on:
  workflow_dispatch:
  push:
    branches:
      - fix-8024-release

permissions:
  contents: write

env:
  GO_VERSION: '1.25.7'
  NODE_VERSION: '20'
  RELEASE_BRANCH: fix-8024-release
  SUFFIX: fix-8024

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 100

      - name: Resolve version and release tag from fix branch
        id: version
        run: |
          set -euo pipefail

          git fetch --tags https://github.com/AdguardTeam/AdGuardHome.git

          base_tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*')"

          if [ -z "${base_tag}" ]; then
            echo "No stable tag matching vX.Y.Z was found on ${{ env.RELEASE_BRANCH }} history"
            exit 1
          fi

          release_tag="${base_tag}+${{ env.SUFFIX }}"

          echo "base_tag=${base_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "Resolved base tag: ${base_tag}"
          echo "Resolved release tag: ${release_tag}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build release artifacts (linux/amd64)
        run: |
          make \
            CHANNEL=release \
            SIGN=0 \
            VERSION="${{ steps.version.outputs.release_tag }}" \
            OS=linux \
            ARCH=amd64 \
            VERBOSE=1 \
            build-release

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          target_commitish: ${{ env.RELEASE_BRANCH }}
          name: ${{ steps.version.outputs.release_tag }}
          generate_release_notes: true
          files: |
            dist/AdGuardHome_linux_amd64.tar.gz
            dist/checksums.txt
            dist/version.txt
            dist/version.json
